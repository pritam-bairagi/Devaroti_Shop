    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "E-commerceStore",
  "name": "Devaroti Shop",
  "alternateName": "Devaroti Shop",
  "url": "https://www.devaroti.shop",
  "logo": "https://devaroti.shop/10.png",
  "image": "https://devaroti.shop/5.png",
  "description": "Largest Hindu devotional multi-vendor marketplace in Bangladesh. Shop puja samagri, worship items & religious essentials from trusted vendors. Admin, seller & courier integrated.",
  "address": {
    "@type": "PostalAddress",
    "addressCountry": "Bangladesh"
  },
  "areaServed": "Bangladesh",
  "availableLanguage": ["Bengali", "English"],
  "currency": "BDT",
  "paymentAccepted": ["Cash on Delivery", "Mobile Banking", "Bank Transfer"],
  "priceRange": "৳1 - ৳99999999",
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
    "opens": "00:00",
    "closes": "23:59"
  },
  "sameAs": [],
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://www.devaroti.shop/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "contactType": "customer service",
    "availableLanguage": "Bengali"
  }
}
</script>
